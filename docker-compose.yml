version: '3.8'

services:
  # Database service running PostgreSQL
  hld_db:
    image: postgres:15
    container_name: hld_db
    environment:
      POSTGRES_DB: hld_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d hld_db"]
      interval: 10s
      timeout: 5s
      retries: 5

